name: XAIP Auto-Collect
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd sdk && npm install
      - run: cd sdk && npx tsx scripts/auto-collect.ts
